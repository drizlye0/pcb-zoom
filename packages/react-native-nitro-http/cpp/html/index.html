<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pcb zoom</title>
  </head>

  <style>
    :root {
      --bg: #f5f5f5;
      --text: #1a1a1a;
      --card: #ffffff;
      --border: #ccc;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --text: #e0e0e0;
        --card: #1e1e1e;
        --border: #333;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
      }
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      height: 50vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    .controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 0.75rem;
    }
    input {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover {
      background: var(--accent-hover);
    }
    video {
      transform: rotate(-90deg);
      background: #000;
      border-radius: 8px;
      max-width: 100%;
      position: absolute;
      top: -28%;
    }
  </style>

  <body>
    <div class="controls">
      <input id="serverIP" type="text" size="16" placeholder="server ip" />
      <input id="serverPort" type="text" size="16" placeholder="port" />
      <button id="connectBtn">connect</button>
    </div>

      <video
        id="remoteStream"
        autoplay
        playsinline
        width="792"
        height="1408"></video>

    <script>
      const connectBtn = document.getElementById('connectBtn');
      const remoteStream = document.getElementById('remoteStream');
      const serverIPInput = document.getElementById('serverIP');
      const serverPortInput = document.getElementById('serverPort');

      const pc = new RTCPeerConnection({
        iceServers: [
          {
            urls: 'stun:stun3.l.google.com:19302',
          },
        ],
      });
      let localCandidates = [];

      pc.onicecandidate = (event) => {
        if (!event.candidate) return;
        localCandidates.push(event.candidate);
      };

      pc.ontrack = (event) => {
        if (remoteStream.srcObject !== event.streams[0]) {
          remoteStream.srcObject = event.streams[0];
        }
      };

      const fetchOffer = async (baseUrl) => {
        const response = await fetch(baseUrl + '/offer', {
          method: 'GET',
          headers: {
            'Content-type': 'application/json',
          },
        });

        if (!response.ok) {
          throw new Error('Offer Error: ' + response.status);
        }

        const offer = await response.json();
        return offer;
      };

      const sendAnswer = async (baseUrl, answer) => {
        const response = await fetch(baseUrl + '/answer', {
          method: 'POST',
          headers: {
            'Content-type': 'application/json',
          },
          body: JSON.stringify(answer),
        });

        if (!response.ok) {
          throw new Error('Error on send answer: ' + response.status);
        }
      };

      const handleCandidates = async (baseUrl) => {
        const response = await fetch(baseUrl + '/icecandidates', {
          method: 'POST',
          headers: {
            'Content-type': 'application/json',
          },
          body: JSON.stringify(localCandidates),
        });

        localCandidates = [];

        if (!response.ok) {
          throw new Error('Candidates Error: ' + response.status);
        }

        const candidates = await response.json();
        if (candidates.length > 0) {
          for (const candidate of candidates) {
            await pc.addIceCandidate(candidate);
          }
        } else {
          console.log('No candidates recieved');
        }
      };

      const connect = async () => {
        try {
          const ip = serverIPInput.value;
          const port = serverPortInput.value;

          if (!ip || !port) {
            alert('insert ip address and port');
            return;
          }

          const baseUrl = 'http://' + ip + ':' + port;

          const offer = await fetchOffer(baseUrl);
          await pc.setRemoteDescription(offer);

          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await sendAnswer(baseUrl, answer);

          setTimeout(() => handleCandidates(baseUrl), 1000);
        } catch (error) {
          alert('Connection Error: ' + error);
        }
      };

      connectBtn.onclick = connect;
      stateBtn.onclick = connectionState;
    </script>
  </body>
</html>
